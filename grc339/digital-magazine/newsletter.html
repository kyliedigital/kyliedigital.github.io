<!doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" /> 
            <link rel="stylesheet" href="style.css">
            <link rel="stylesheet" href="https://use.typekit.net/iva0xqd.css">
            <title>Subscribe to FITS Magazine</title>

            
                <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
                <meta http-equiv="Pragma" content="no-cache" />
                <meta http-equiv="Expires" content="0" />
            
        </head>	

        <body>
            <div class="container">
                
                <header>
                    <h1>
                        <a href="index.html" alt="FITS Magazine">
                            <img src="Fits magazine logo.svg">
                        </a>
                    </h1>
                    <nav> 
                        <ul>
                            <li><a href="#">Archives</a></li>
                            <li><a href="#">Styling</a></li>
                            <li><a href="#">Design</a></li>
                            <li><a href="#">Modeling</a></li>
                            <li><a href="#">Creative Direction</a></li>
                   </ul>
                    </nav>
                </header>
                <main class="newsletter">
                    <section class="newsletter-intro">
                       <h2>Subscribe to FITS Magazine</h2>
        
                       <p>
                        Don't miss a stitch: subscribe for exclusive insights on the collections, aesthetics, and visual stories shaping the future of style.
                       </p>
                    </section>
        
                    <form>
                       <section class="form-section">
                          <label for="name">Name</label>
        
                          <input type="text" id="name" name="name">
                       </section>
        
                       <section class="form-section">
                          <label for="email">Email</label>
        
                          <input type="email" id="email" name="email">
                       </section>
        
                       <section class="form-section">
                          <h3>How often do you want to hear from us?</h3>
        
                          <div class="checkboxes">
                             <label>
                                <input type="checkbox" name="newsletter" value="daily">
                                Daily
                             </label>
        
                             <label>
                                <input type="checkbox" name="newsletter" value="weekly">
                                Weekly
                             </label>
        
                             <label>
                                <input type="checkbox" name="newsletter" value="Monthly">
                                Monthly
                             </label>
                          </div>
                       </section>
        
                       <button type="submit">Subscribe</button>
                    </form>
                 </main>
  

                <footer>
                    <p>All rights reserved.</p>
                </footer>
            </div>
        </body>
    </html>
